name: TryHackMe Update Badge
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tryhackme-badge-update:
    name: Update TryHackMe badge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download badge image
        run: |
          curl -o tryhackme.png https://tryhackme-badges.s3.amazonaws.com/GooseyintheShell.png

      - name: Commit and push badge
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tryhackme.png
          git diff --cached --quiet || git commit -m "Update TryHackMe badge"
          git push
